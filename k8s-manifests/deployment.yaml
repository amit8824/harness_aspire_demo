apiVersion: apps/v1
kind: Deployment
metadata:
  name: cicd-demo-app
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cicd-demo-app
  template:
    metadata:
      labels:
        app: cicd-demo-app
    spec:
      containers:
        - name: app
          image: YOUR_DOCKERHUB_USERNAME/cicd-demo-app:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: '100m', memory: '128Mi' }
            limits:   { cpu: '500m', memory: '256Mi' }
