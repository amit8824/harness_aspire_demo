apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-aspire-demo
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: harness-aspire-demo
  template:
    metadata:
      labels:
        app: harness-aspire-demo
    spec:
      containers:
        - name: app
          image: amit8824/harness-aspire-demo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: '100m', memory: '128Mi' }
            limits:   { cpu: '500m', memory: '256Mi' }
