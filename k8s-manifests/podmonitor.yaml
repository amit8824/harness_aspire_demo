apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-pods-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    any: true
  selector:
    matchLabels: {}
  podMetricsEndpoints:
    - path: /stats/prometheus
      port: http-envoy-prom
      interval: 15s
