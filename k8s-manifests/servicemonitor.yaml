apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: istio-component-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - istio-system
      - default
  selector:
    matchExpressions:
      - key: istio
        operator: Exists
  endpoints:
    - port: http-monitoring
      interval: 15s
      path: /stats/prometheus
